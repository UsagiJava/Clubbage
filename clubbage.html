<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Clubbage: The Game</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/bootstrap-icons.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="css/clubbage.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1>Clubbage</h1>
            </div>
        </div>
        <div class="row bg-primary-subtle">
            <div class="col-12 text-center">
                <button id="btn_main_start" class="btn btn-primary" onclick="initGame()">Start</button>
            </div>
            <div class="col-12">
                <div id="deck_id_mainDeck"></div>
            </div>
        </div>

        <div class="row bg-primary-subtle">
            <div class="col-6">
                <div id="player1_hitpoints" class="player_hitpoints">
                    <span id="player1_hp_remaining" class="player_hitpoints_remaining"></span>
                    <span class="player_name">Player 1</span><span id="player1_stats" class="player_stats">50/50</span>
                </div>
            </div>
            <div class="col-6">
                <div id="player2_hitpoints" class="player_hitpoints">
                    <span id="player2_hp_remaining" class="player_hitpoints_remaining"></span>
                    <span class="player_name">Player 2</span><span id="player2_stats" class="player_stats">50/50</span>
                </div>
            </div>
        </div>


        <div class="row bg-primary-subtle">
            <div class="col-12 py-2 position-relative">
                <div id="deck_id_cribDeck" class="d-flex w-100 align-items-start position-absolute top-0 start-0"></div>
                <div class="d-flex justify-content-center">
                    <div id="deck_id_flipDeck"></div>
                </div>
            </div>
        </div>

        <div class="row bg-secondary-subtle py-2">
            <div class="col-12 text-center align-self-start py-2">
                <div id="cards_table" class="me-3">
                    <div id="deck_id_player2Deck"></div>
                </div>
                <div id="controls_table">
                    <div class="text-center">
                        <button id="btn_player2_sort_suit" class="btn btn-primary text-nowrap px-2 py-1" onclick="sortDeck('deck_id_player2Deck', 'player2Deck','suit-value')" disabled="disabled" aria-label="Sort Suit" title="Sort Suit"><i class="bi bi-arrow-left"></i></button>
                        <button id="btn_player2_shuffle" class="btn btn-primary text-nowrap px-2 py-1" onclick="shuffleDeck('deck_id_player2Deck', 'player2Deck')" disabled="disabled" aria-label="Shuffle" title="Shuffle"><i class="bi bi-arrow-up"></i></button>
                        <button id="btn_player2_sort_value" class="btn btn-primary text-nowrap px-2 py-1" onclick="sortDeck('deck_id_player2Deck', 'player2Deck','value')" disabled="disabled" aria-label="Sort Value" title="Sort Value"><i class="bi bi-arrow-right"></i></button>
                    </div>
                    <div class="text-center pt-1">
                        <button id="btn_player2_send" class="btn btn-primary text-nowrap px-2 py-1" type="button" disabled="disabled" aria-label="Send" title="Send"><i class="bi bi-arrow-down"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row bg-primary-subtle">
            <div class="col-12">
                <div id="deck_id_playDeck"></div>
            </div>
        </div>

        <div class="row bg-secondary-subtle py-2">
            <div class="col-12 text-center align-self-start py-2">
                <div id="cards_table" class="me-3">
                    <div id="deck_id_player1Deck"></div>
                </div>
                <div id="controls_table">
                    <div class="text-center pb-1">
                        <button id="btn_player1_send" class="btn btn-primary text-nowrap px-2 py-1" type="button" disabled="disabled" aria-label="Send" title="Send"><i class="bi bi-arrow-up"></i></button>
                    </div>
                    <div class="text-center">
                        <button id="btn_player1_sort_suit" class="btn btn-primary text-nowrap px-2 py-1" onclick="sortDeck('deck_id_player1Deck', 'player1Deck','suit-value')" disabled="disabled" aria-label="Sort Suit" title="Sort Suit"><i class="bi bi-arrow-left"></i></button>
                        <button id="btn_player1_shuffle" class="btn btn-primary text-nowrap px-2 py-1" onclick="shuffleDeck('deck_id_player1Deck', 'player1Deck')" disabled="disabled" aria-label="Shuffle" title="Shuffle"><i class="bi bi-arrow-down"></i></button>
                        <button id="btn_player1_sort_value" class="btn btn-primary text-nowrap px-2 py-1" onclick="sortDeck('deck_id_player1Deck', 'player1Deck','value')" disabled="disabled" aria-label="Sort Value" title="Sort Value"><i class="bi bi-arrow-right"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row game_commentary_row">
            <div class="col-12 px-0">
                <div id="gameLog" class="game_commentary_log overflow-auto"></div>
            </div>
        </div>
    </div>
    <script type="module" src="js/clubbage.js"></script><!-- needs to be type="module" for the import of Deck.js class file. -->
</body>
</html>
